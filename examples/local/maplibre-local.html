<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>fast-barnes-ts Local Viewer</title>
    <link
      href="https://unpkg.com/maplibre-gl@5.3.0/dist/maplibre-gl.css"
      rel="stylesheet"
    />
    <style>
      html,
      body,
      #map {
        margin: 0;
        width: 100%;
        height: 100%;
        font-family: sans-serif;
      }

      .panel {
        position: absolute;
        top: 12px;
        left: 12px;
        z-index: 10;
        max-width: 340px;
        background: rgba(255, 255, 255, 0.95);
        border: 1px solid #d1d5db;
        border-radius: 8px;
        padding: 12px;
      }

      .panel h1 {
        margin: 0 0 8px;
        font-size: 16px;
      }

      .controls {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      .controls .full {
        grid-column: 1 / -1;
      }

      label {
        font-size: 12px;
        display: grid;
        gap: 4px;
      }

      input,
      select,
      button {
        font: inherit;
        padding: 6px;
      }

      #status {
        margin-top: 8px;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <div id="map"></div>
    <div class="panel">
      <h1>Local Viewer</h1>
      <div class="controls">
        <label class="full"
          >Input GeoJSON
          <input
            id="fileInput"
            type="file"
            accept=".json,.geojson,application/geo+json,application/json"
          />
        </label>
        <label
          >Value field
          <input id="fieldInput" type="text" value="slp" />
        </label>
        <label
          >Mode
          <select id="modeInput">
            <option value="isoline">isoline</option>
            <option value="isoband">isoband</option>
          </select>
        </label>
        <label
          >Spacing
          <input id="spacingInput" type="number" step="any" min="0" value="4" />
        </label>
        <label
          >Base
          <input id="baseInput" type="number" step="any" value="1024" />
        </label>
        <label
          >Resolution X
          <input id="resXInput" type="number" step="1" min="2" value="128" />
        </label>
        <label
          >Resolution Y
          <input id="resYInput" type="number" step="1" min="2" value="128" />
        </label>
        <label
          >Sigma (optional)
          <input
            id="sigmaInput"
            type="number"
            step="any"
            min="0"
            placeholder="auto"
          />
        </label>
        <label style="align-items: center; grid-template-columns: auto 1fr"
          ><input id="debugInput" type="checkbox" /> Debug logs</label
        >
        <label style="align-items: center; grid-template-columns: auto 1fr"
          ><input id="autoRunInput" type="checkbox" checked /> Auto-run</label
        >
        <button id="runButton" class="full">Run interpolation</button>
      </div>
      <div id="status">Choose a local GeoJSON file to begin.</div>
    </div>

    <script src="https://unpkg.com/maplibre-gl@5.3.0/dist/maplibre-gl.js"></script>
    <script type="module">
      import { interpolateGeoJSON } from "../../dist/index.js";

      const statusEl = document.getElementById("status");
      const fileInput = document.getElementById("fileInput");
      const fieldInput = document.getElementById("fieldInput");
      const modeInput = document.getElementById("modeInput");
      const spacingInput = document.getElementById("spacingInput");
      const baseInput = document.getElementById("baseInput");
      const resXInput = document.getElementById("resXInput");
      const resYInput = document.getElementById("resYInput");
      const sigmaInput = document.getElementById("sigmaInput");
      const debugInput = document.getElementById("debugInput");
      const autoRunInput = document.getElementById("autoRunInput");
      const runButton = document.getElementById("runButton");

      const map = new maplibregl.Map({
        container: "map",
        style: "https://demotiles.maplibre.org/style.json",
        center: [-98, 39],
        zoom: 3,
      });

      const RESULT_SOURCE = "interpolation-result";
      const BAND_LAYER = "interpolation-band";
      const LINE_LAYER = "interpolation-line";

      let loadedFeatureCollection = null;
      let pendingRun = null;

      function computeBounds(fc) {
        if (!fc) return null;
        let minX = Number.POSITIVE_INFINITY;
        let minY = Number.POSITIVE_INFINITY;
        let maxX = Number.NEGATIVE_INFINITY;
        let maxY = Number.NEGATIVE_INFINITY;

        function visit(coords) {
          if (!Array.isArray(coords)) return;
          if (typeof coords[0] === "number" && typeof coords[1] === "number") {
            const x = coords[0];
            const y = coords[1];
            if (x < minX) minX = x;
            if (x > maxX) maxX = x;
            if (y < minY) minY = y;
            if (y > maxY) maxY = y;
            return;
          }
          for (const item of coords) visit(item);
        }

        for (const feature of fc.features || [])
          visit(feature?.geometry?.coordinates);
        if (!Number.isFinite(minX)) return null;
        return [
          [minX, minY],
          [maxX, maxY],
        ];
      }

      function ensureResultSource() {
        if (!map.getSource(RESULT_SOURCE)) {
          map.addSource(RESULT_SOURCE, {
            type: "geojson",
            data: { type: "FeatureCollection", features: [] },
          });
        }
      }

      function clearResultLayers() {
        if (map.getLayer(BAND_LAYER)) map.removeLayer(BAND_LAYER);
        if (map.getLayer(LINE_LAYER)) map.removeLayer(LINE_LAYER);
      }

      function renderResult(result, mode) {
        ensureResultSource();
        map.getSource(RESULT_SOURCE).setData(result);
        clearResultLayers();

        if (mode.startsWith("isoband")) {
          map.addLayer({
            id: BAND_LAYER,
            type: "fill",
            source: RESULT_SOURCE,
            paint: {
              "fill-color": [
                "interpolate",
                ["linear"],
                ["get", "value"],
                980,
                "#1d4ed8",
                1020,
                "#10b981",
                1060,
                "#f97316",
              ],
              "fill-opacity": 0.5,
              "fill-outline-color": "#111827",
            },
          });
        } else {
          map.addLayer({
            id: LINE_LAYER,
            type: "line",
            source: RESULT_SOURCE,
            paint: {
              "line-color": "#111827",
              "line-width": 1.25,
            },
          });
        }
      }

      function parseNumber(inputEl, name, fallback = undefined) {
        const raw = String(inputEl.value ?? "").trim();
        if (!raw) return fallback;
        const n = Number(raw);
        if (!Number.isFinite(n))
          throw new Error(`${name} must be a finite number`);
        return n;
      }

      function readControls() {
        const field = fieldInput.value.trim();
        if (!field) throw new Error("Value field is required");

        const mode = modeInput.value;
        const spacing = parseNumber(spacingInput, "Spacing");
        const base = parseNumber(baseInput, "Base", 0);
        const resX = Math.trunc(parseNumber(resXInput, "Resolution X"));
        const resY = Math.trunc(parseNumber(resYInput, "Resolution Y"));
        if (resX < 2 || resY < 2)
          throw new Error("Resolution values must be >= 2");
        if (!(spacing > 0)) throw new Error("Spacing must be > 0");

        const sigma = parseNumber(sigmaInput, "Sigma", undefined);

        return {
          field,
          mode,
          options: {
            debug: debugInput.checked,
            resolution: [resX, resY],
            ...(sigma !== undefined ? { sigma } : {}),
            contourOptions: {
              spacing,
              base,
              smooth: true,
            },
          },
        };
      }

      function runInterpolation() {
        if (!loadedFeatureCollection) {
          statusEl.textContent = "Load a GeoJSON file first.";
          return;
        }

        try {
          const { field, mode, options } = readControls();
          const start = performance.now();
          const result = interpolateGeoJSON(
            loadedFeatureCollection,
            field,
            mode,
            options,
          );
          renderResult(result, mode);
          const elapsedMs = (performance.now() - start).toFixed(1);
          statusEl.textContent = `Interpolated ${result.features.length} features in ${elapsedMs} ms (${mode}).`;
        } catch (err) {
          statusEl.textContent = String(err?.message || err);
        }
      }

      function scheduleRun() {
        if (!autoRunInput.checked) return;
        if (pendingRun) clearTimeout(pendingRun);
        pendingRun = setTimeout(() => {
          pendingRun = null;
          runInterpolation();
        }, 150);
      }

      async function loadSelectedFile(file) {
        const text = await file.text();
        const parsed = JSON.parse(text);
        if (
          !parsed ||
          parsed.type !== "FeatureCollection" ||
          !Array.isArray(parsed.features)
        ) {
          throw new Error("Input file must be a GeoJSON FeatureCollection");
        }

        loadedFeatureCollection = parsed;
        const bounds = computeBounds(parsed);
        if (bounds) {
          map.fitBounds(bounds, { padding: 40, duration: 0 });
        }

        statusEl.textContent = `Loaded ${parsed.features.length} features from ${file.name}.`;
        scheduleRun();
      }

      fileInput.addEventListener("change", async (event) => {
        const file = event.target.files?.[0];
        if (!file) return;
        try {
          await loadSelectedFile(file);
        } catch (err) {
          statusEl.textContent = String(err?.message || err);
        }
      });

      runButton.addEventListener("click", runInterpolation);

      [
        fieldInput,
        modeInput,
        spacingInput,
        baseInput,
        resXInput,
        resYInput,
        sigmaInput,
      ].forEach((el) => {
        el.addEventListener("input", scheduleRun);
        el.addEventListener("change", scheduleRun);
      });

      debugInput.addEventListener("change", scheduleRun);
    </script>
  </body>
</html>
